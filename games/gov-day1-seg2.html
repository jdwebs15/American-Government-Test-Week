<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Government Test Week — Day 1 Segment 1</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>
  <div class="wrap" id="app"></div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxMLVDL9idsp6FbHO1pYK63CQhpPM4jN0PrY2NBaULgmcN2mhMnRgEpubYUp7Y6VDqg/exec";

const TEST_META = {
  subject: "Government",
  week: "Test Week",
  day: "Day 1",
  segment: "Segment 1",
  title: "Government Test Week — Day 1 Segment 1",
  focus: "Recognition"
};

const ATTEMPT_KEY = "GOV_D1_S1_ATTEMPT_LOCK";
const STORAGE_KEY = "LEGEND_GOV_D1_S1_STATE_V2";

const QUESTION_BANK = [
  { id:"GOV_D1_S1_Q01", cs:"CS 1", type:"mc", stem:"Which document established the framework for the government of the United States?", choices:["Articles of Confederation","Declaration of Independence","U.S. Constitution","Northwest Ordinance"], answer:[2] },
  { id:"GOV_D1_S1_Q02", cs:"CS 2", type:"mc", stem:"The idea that government gets its authority from the people is based on", choices:["divine right","social contract theory","judicial review","federal supremacy"], answer:[1] },
  { id:"GOV_D1_S1_Q03", cs:"CS 3", type:"mc", stem:"A source written mainly to persuade readers toward a point of view is best classified as", choices:["editorial","official record","statistical chart","constitutional clause"], answer:[0] },
  { id:"GOV_D1_S1_Q04", cs:"CS 4", type:"mc", stem:"Which principle is most directly designed to prevent one branch of government from becoming too powerful?", choices:["checks and balances","federalism","popular sovereignty","judicial federalism"], answer:[0] },
  { id:"GOV_D1_S1_Q05", cs:"CS 5", type:"mc", stem:"Government gets its authority from the people. Which principle does this describe?", choices:["federalism","popular sovereignty","judicial review","due process"], answer:[1] },
  { id:"GOV_D1_S1_Q06", cs:"CS 5", type:"mc", stem:"Power divided among legislative, executive, and judicial branches is known as", choices:["separation of powers","incorporation","federalism","reserved powers"], answer:[0] },
  { id:"GOV_D1_S1_Q07", cs:"CS 5", type:"mc", stem:"A government official may act only within powers allowed by law. This idea reflects", choices:["limited government","popular sovereignty","direct democracy","majority rule"], answer:[0] },
  { id:"GOV_D1_S1_Q08", cs:"CS 6", type:"mc", stem:"Power shared between state and national governments is called", choices:["federalism","republicanism","incorporation","judicial review"], answer:[0] },
  { id:"GOV_D1_S1_Q09", cs:"CS 6", type:"mc", stem:"Which level of government is chiefly responsible for conducting foreign policy?", choices:["local","county","state","federal"], answer:[3] },
  { id:"GOV_D1_S1_Q10", cs:"CS 7", type:"mc", stem:"Marbury v. Madison is most closely associated with", choices:["implied powers","judicial review","executive privilege","reserved powers"], answer:[1] },
  { id:"GOV_D1_S1_Q11", cs:"CS 7", type:"mc", stem:"McCulloch v. Maryland supported the constitutional idea of", choices:["state nullification","implied powers","term limits","local supremacy"], answer:[1] },
  { id:"GOV_D1_S1_Q12", cs:"CS 7", type:"mc", stem:"Gibbons v. Ogden expanded national authority over", choices:["interstate commerce","state constitutions","criminal procedure","elections"], answer:[0] },
  { id:"GOV_D1_S1_Q13", cs:"CS 8", type:"mc", stem:"Which amendment protects freedom of speech?", choices:["First Amendment","Second Amendment","Fourth Amendment","Fifth Amendment"], answer:[0] },
  { id:"GOV_D1_S1_Q14", cs:"CS 8", type:"mc", stem:"Protection against unreasonable searches and seizures is found in the", choices:["Second Amendment","Fourth Amendment","Fifth Amendment","Eighth Amendment"], answer:[1] },
  { id:"GOV_D1_S1_Q15", cs:"CS 8", type:"mc", stem:"Protection against self-incrimination is provided by the", choices:["First Amendment","Fourth Amendment","Fifth Amendment","Tenth Amendment"], answer:[2] },
  { id:"GOV_D1_S1_Q16", cs:"CS 9", type:"mc", stem:"The Fourteenth Amendment is especially important because it extended due process and equal protection against actions by", choices:["foreign governments","state governments","only Congress","private companies"], answer:[1] },
  { id:"GOV_D1_S1_Q17", cs:"CS 10", type:"mc", stem:"The right to a speedy and public trial is protected by the", choices:["Fourth Amendment","Fifth Amendment","Sixth Amendment","Eighth Amendment"], answer:[2] },
  { id:"GOV_D1_S1_Q18", cs:"CS 11", type:"mc", stem:"Which branch of government is primarily responsible for carrying out laws?", choices:["legislative","executive","judicial","county"], answer:[1] },
  { id:"GOV_D1_S1_Q19", cs:"CS 11", type:"mc", stem:"Which branch interprets laws and decides cases?", choices:["executive","legislative","judicial","administrative"], answer:[2] },
  { id:"GOV_D1_S1_Q20", cs:"CS 12", type:"mc", stem:"A presidential veto is an example of", choices:["popular sovereignty","checks and balances","federalism","incorporation"], answer:[1] },
  { id:"GOV_D1_S1_Q21", cs:"CS 13", type:"mc", stem:"Political parties most directly help citizens by", choices:["issuing court rulings","selecting candidates and organizing issues","enforcing criminal laws","printing money"], answer:[1] },
  { id:"GOV_D1_S1_Q22", cs:"CS 14", type:"mc", stem:"An organization that tries to influence public policy on behalf of a cause or group is an", choices:["interest group","electoral college","executive agency","county board"], answer:[0] },
  { id:"GOV_D1_S1_Q23", cs:"CS 15", type:"mc", stem:"Casting a ballot in an election is an example of", choices:["executive action","civic participation","judicial review","treaty making"], answer:[1] },
  { id:"GOV_D1_S1_Q24", cs:"CS 16", type:"mc", stem:"Which is an example of local government?", choices:["U.S. Senate","Ohio Supreme Court","city council","state auditor"], answer:[2] },
  { id:"GOV_D1_S1_Q25", cs:"CS 17", type:"mc", stem:"A citizen attending a town meeting to speak on an issue is an example of", choices:["judicial review","civic engagement","federal supremacy","executive privilege"], answer:[1] },
  { id:"GOV_D1_S1_Q26", cs:"CS 18", type:"mc", stem:"A debated issue about what government should do is best described as a", choices:["judicial order","public policy issue","reserved power","federal grant"], answer:[1] },
  { id:"GOV_D1_S1_Q27", cs:"CS 19", type:"mc", stem:"Which institution most directly helps shape public opinion by deciding which issues receive attention?", choices:["media","cabinet","jury","county clerk"], answer:[0] },
  { id:"GOV_D1_S1_Q28", cs:"CS 20", type:"mc", stem:"When government changes taxes and spending to influence the economy, it is using", choices:["foreign policy","monetary policy","fiscal policy","judicial policy"], answer:[2] },
  { id:"GOV_D1_S1_Q29", cs:"CS 21", type:"mc", stem:"Which institution manages monetary policy in the United States?", choices:["Congress","Supreme Court","Federal Reserve","Ohio General Assembly"], answer:[2] },
  { id:"GOV_D1_S1_Q30", cs:"CS 20", type:"mc", stem:"Increasing government spending during an economic slowdown is generally considered", choices:["expansionary fiscal policy","contractionary fiscal policy","judicial activism","federalism"], answer:[0] }
];

function hash32(str){
  let h = 2166136261 >>> 0;
  for(let i = 0; i < str.length; i++){
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return h >>> 0;
}
function mulberry32(a){
  return function(){
    let t = a += 0x6D2B79F5;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function shuffleArray(arr, seedStr){
  const a = arr.slice();
  const rand = mulberry32(hash32(seedStr));
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(rand() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let QUESTIONS = [];

let state = {
  studentName: "",
  startedAt: null,
  current: 0,
  answers: [],
  submitted: false,
  score: null,
  attemptNumber: 1,
  questionOrderSeed: null
};

function escapeHtml(str){
  return String(str ?? "").replace(/[&<>"']/g, s => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[s]));
}
function nowLocalString(d){
  return new Date(d).toLocaleString();
}
function formatRuntime(seconds){
  const m = Math.floor(seconds / 60).toString().padStart(2,"0");
  const s = Math.floor(seconds % 60).toString().padStart(2,"0");
  return `${m}:${s}`;
}
function letter(i){
  return ["A","B","C","D","E","F"][i] || "";
}
function sameArray(a,b){
  return Array.isArray(a) && Array.isArray(b) && a.length === b.length && a.every((v,i)=>v===b[i]);
}
function isCorrect(q, answer){
  return Array.isArray(answer) && sameArray(answer, q.answer);
}
function buildQuestions(){
  const seed = state.questionOrderSeed || "default-seed";
  QUESTIONS = shuffleArray(QUESTION_BANK, seed);
  if(!Array.isArray(state.answers) || state.answers.length !== QUESTIONS.length){
    state.answers = Array(QUESTIONS.length).fill(null);
  }
}
function save(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      if(parsed && !parsed.submitted){
        state = parsed;
      }
    }
  }catch(err){}
}
function hardRestart(){
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}
function countAnswered(){
  return state.answers.filter(a => a !== null).length;
}
function isLocked(){
  return localStorage.getItem(ATTEMPT_KEY) === "USED";
}
function buildLockedScreen(){
  document.getElementById("app").innerHTML = `
    <a class="back-link" href="../index.html">← Back to Hub</a>
    <div class="panel lock-box">
      <div class="kicker">Attempt Locked</div>
      <h1>${TEST_META.title}</h1>
      <p class="sub">This segment has already been completed on this device/browser.</p>
      <div class="footer-actions">
        <button onclick="location.href='../index.html'">Back to Hub</button>
      </div>
    </div>
  `;
}
function buildIntro(){
  document.getElementById("app").innerHTML = `
    <a class="back-link" href="../index.html">← Back to Hub</a>
    <div class="panel name-card">
      <div class="kicker">Legend Mastery Series • Government</div>
      <h1>${TEST_META.title}</h1>
      <p class="sub">30-question OST-style segment. Name is required to begin. One attempt only.</p>
      <input id="nameInput" class="input" type="text" maxlength="60" placeholder="Enter your name to begin" />
      <div class="help">
        Recognition-focused segment with broad standards coverage. Questions are shuffled for test realism.
      </div>
      <div class="footer-actions">
        <button id="startBtn">Start Test</button>
      </div>
    </div>
  `;
  document.getElementById("startBtn").onclick = () => {
    const name = document.getElementById("nameInput").value.trim();
    if(!name){
      alert("Enter your name to begin.");
      return;
    }
    state.studentName = name;
    state.startedAt = new Date().toISOString();
    state.attemptNumber = 1;
    state.questionOrderSeed = `${state.studentName}|${state.startedAt}|${TEST_META.title}`;
    buildQuestions();
    save();
    renderTest();
  };
}
function buildTopbar(){
  const started = new Date(state.startedAt);
  const runtime = formatRuntime((Date.now() - started.getTime()) / 1000);
  const answered = countAnswered();
  const progressPct = Math.round((answered / QUESTIONS.length) * 100);
  return `
    <a class="back-link" href="../index.html">← Back to Hub</a>
    <div class="topbar">
      <div class="topbar-left">
        <button class="danger" onclick="hardRestart()">Restart Test</button>
      </div>
      <div class="topbar-right">
        <span class="pill">Name: ${escapeHtml(state.studentName)}</span>
        <span class="pill">Attempt: ${state.attemptNumber}</span>
        <span class="pill">Started: ${escapeHtml(nowLocalString(started))}</span>
        <span class="pill">Runtime: <span id="runtimeDisplay">${runtime}</span></span>
      </div>
    </div>
    <div class="panel">
      <div class="stats">
        <div class="stat"><div class="stat-label">Test</div><div class="stat-value">${TEST_META.day} ${TEST_META.segment}</div></div>
        <div class="stat"><div class="stat-label">Focus</div><div class="stat-value">${TEST_META.focus}</div></div>
        <div class="stat"><div class="stat-label">Progress</div><div class="stat-value">${answered} / ${QUESTIONS.length}</div></div>
        <div class="stat"><div class="stat-label">Completion</div><div class="stat-value">${progressPct}%</div></div>
      </div>
      <div class="progress-wrap"><div class="progress-bar" style="width:${progressPct}%"></div></div>
    </div>
  `;
}
function renderQuestion(){
  const q = QUESTIONS[state.current];
  const currentAnswer = state.answers[state.current];
  document.getElementById("app").innerHTML = buildTopbar() + `
    <div class="panel question-card">
      <div class="q-type">Question ${state.current + 1} of ${QUESTIONS.length} • ${q.type.toUpperCase()} • ${q.cs}</div>
      <div class="q-stem">${escapeHtml(q.stem)}</div>
      <div class="choices">
        ${q.choices.map((choice, i) => `
          <button class="choice ${currentAnswer !== null && currentAnswer[0] === i ? "selected" : ""}" onclick="selectChoice(${i})">
            <span class="choice-letter">${letter(i)}.</span> ${escapeHtml(choice)}
          </button>
        `).join("")}
      </div>
      <div class="footer-actions">
        <button class="secondary" ${state.current === 0 ? "disabled" : ""} onclick="prevQuestion()">Previous</button>
        <button class="secondary" onclick="skipQuestion()">Skip</button>
        <button class="warn" onclick="reviewScreen()">Review / Submit</button>
      </div>
    </div>
  `;
}
function renderTest(){
  if(state.current < 0) state.current = 0;
  if(state.current >= QUESTIONS.length) state.current = QUESTIONS.length - 1;
  renderQuestion();
}
function selectChoice(i){
  state.answers[state.current] = [i];
  save();
  if(state.current < QUESTIONS.length - 1){
    state.current++;
    save();
    renderQuestion();
  }else{
    reviewScreen();
  }
}
function prevQuestion(){
  if(state.current > 0){
    state.current--;
    save();
    renderQuestion();
  }
}
function skipQuestion(){
  if(state.current < QUESTIONS.length - 1){
    state.current++;
    save();
    renderQuestion();
  }else{
    reviewScreen();
  }
}
function jumpToQuestion(idx){
  state.current = idx;
  save();
  renderQuestion();
}
function reviewScreen(){
  const answered = countAnswered();
  const unanswered = QUESTIONS.length - answered;
  document.getElementById("app").innerHTML = buildTopbar() + `
    <div class="panel">
      <h2>Review Before Submitting</h2>
      <p class="sub">Answered: ${answered} of ${QUESTIONS.length}. Unanswered: ${unanswered}.</p>
      <div class="review-box">
        ${QUESTIONS.map((q, idx) => `
          <div class="review-item">
            <div class="review-top">
              <strong>Q${String(idx + 1).padStart(2,"0")}</strong>
              <span class="tag">${q.cs}</span>
            </div>
            <div class="muted">${escapeHtml(q.stem)}</div>
            <div style="margin-top:8px;">
              ${state.answers[idx] === null
                ? `<span class="tag">No answer</span>`
                : `<span class="tag">Answered: ${letter(state.answers[idx][0])}</span>`
              }
            </div>
            <div class="footer-actions">
              <button class="secondary" onclick="jumpToQuestion(${idx})">Go to Question</button>
            </div>
          </div>
        `).join("")}
      </div>
      <hr class="sep">
      <div class="footer-actions">
        <button class="secondary" onclick="renderQuestion()">Back to Test</button>
        <button onclick="submitTest()">Submit Segment</button>
      </div>
    </div>
  `;
}
async function submitTest(){
  if(state.submitted) return;

  const endedAt = new Date().toISOString();
  const score = QUESTIONS.reduce((sum, q, idx) => sum + (isCorrect(q, state.answers[idx]) ? 1 : 0), 0);
  const accuracy = Math.round((score / QUESTIONS.length) * 100);

  const payload = {
    mode: "submit_test",
    studentName: state.studentName,
    subject: TEST_META.subject,
    week: TEST_META.week,
    day: TEST_META.day,
    segment: TEST_META.segment,
    title: TEST_META.title,
    focus: TEST_META.focus,
    startedAt: state.startedAt,
    endedAt,
    runtimeSeconds: Math.round((new Date(endedAt) - new Date(state.startedAt)) / 1000),
    score,
    total: QUESTIONS.length,
    accuracy,
    attemptNumber: state.attemptNumber,
    questions: QUESTIONS.map((q, idx) => ({
      id: q.id,
      cs: q.cs,
      type: q.type,
      stem: q.stem,
      correctAnswer: q.answer,
      studentAnswer: state.answers[idx],
      correct: isCorrect(q, state.answers[idx]) ? 1 : 0
    }))
  };

  try{
    const res = await fetch(SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(payload)
    });
    const text = await res.text();
    let parsed = {};
    try{ parsed = JSON.parse(text); }catch(err){}
    if(parsed && parsed.ok === false){
      alert(parsed.message || "This test appears to have already been submitted.");
      localStorage.setItem(ATTEMPT_KEY, "USED");
      buildLockedScreen();
      return;
    }
  }catch(err){
    alert("Submission did not reach the spreadsheet. Check the Apps Script URL and deployment settings, then try again.");
    return;
  }

  localStorage.setItem(ATTEMPT_KEY, "USED");
  state.submitted = true;
  state.score = score;
  save();

  document.getElementById("app").innerHTML = `
    <a class="back-link" href="../index.html">← Back to Hub</a>
    <div class="panel">
      <div class="kicker">Submission Complete</div>
      <h1>${TEST_META.title}</h1>
      <div class="stats">
        <div class="stat"><div class="stat-label">Name</div><div class="stat-value">${escapeHtml(state.studentName)}</div></div>
        <div class="stat"><div class="stat-label">Attempt</div><div class="stat-value">${state.attemptNumber}</div></div>
        <div class="stat"><div class="stat-label">Date</div><div class="stat-value">${escapeHtml(new Date(endedAt).toLocaleDateString())}</div></div>
        <div class="stat"><div class="stat-label">Start</div><div class="stat-value">${escapeHtml(nowLocalString(state.startedAt))}</div></div>
        <div class="stat"><div class="stat-label">End</div><div class="stat-value">${escapeHtml(nowLocalString(endedAt))}</div></div>
        <div class="stat"><div class="stat-label">Runtime</div><div class="stat-value">${formatRuntime(payload.runtimeSeconds)}</div></div>
        <div class="stat"><div class="stat-label">Score</div><div class="stat-value">${score} / ${QUESTIONS.length}</div></div>
        <div class="stat"><div class="stat-label">Accuracy</div><div class="stat-value">${accuracy}%</div></div>
        <div class="stat"><div class="stat-label">Result</div><div class="stat-value ${accuracy >= 80 ? "result-ready" : "result-review"}">${accuracy >= 80 ? "READY" : "REVIEW"}</div></div>
      </div>
      <div class="footer-actions">
        <button onclick="location.href='../index.html'">Back to Hub</button>
      </div>
    </div>
  `;
  localStorage.removeItem(STORAGE_KEY);
}
function tick(){
  const el = document.getElementById("runtimeDisplay");
  if(el && state.startedAt){
    el.textContent = formatRuntime((Date.now() - new Date(state.startedAt).getTime()) / 1000);
  }
}

load();
if(isLocked()){
  buildLockedScreen();
}else if(!state.studentName || !state.startedAt){
  buildIntro();
}else{
  buildQuestions();
  renderTest();
}

setInterval(tick, 1000);

window.hardRestart = hardRestart;
window.prevQuestion = prevQuestion;
window.skipQuestion = skipQuestion;
window.reviewScreen = reviewScreen;
window.jumpToQuestion = jumpToQuestion;
window.selectChoice = selectChoice;
window.submitTest = submitTest;
</script>
</body>
</html>
