<body>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw3LxbT3Hm4VMrdZ9V7soijQ_rdOWVoALxAeq7HyAftiTqNmH8zDLUdjfkwhJDo0HY4/exec";

const TEST_META = {
  subject: "Government",
  week: "Test Week",
  day: "Day 2",
  segment: "Segment 2",
  title: "Government Test Week — Period 6 Group 3 Advanced Segment 2",
  focus: "Advanced Application and Reasoning"
};

const ATTEMPT_KEY = "GOV_P6_D2_ADV_S2_ATTEMPT_LOCK";
const STORAGE_KEY = "LEGEND_GOV_P6_D2_ADV_S2_STATE_V1";
const TEACHER_SECRET = "legend";
const TEACHER_OVERRIDE = new URLSearchParams(location.search).get("unlock") === TEACHER_SECRET;

const QUESTION_BLOCKS = [[{"id": "P6ADS2_Q01", "cs": "CS 3", "type": "partab", "stimulus": "A newspaper editorial argues that a mayor's tax proposal will 'destroy families and neighborhoods' without presenting data.", "stem": "Part A: What type of source is this?", "choices": ["editorial", "official report", "statistical chart", "constitutional clause"], "answer": [0]}, {"id": "P6ADS2_Q02", "cs": "CS 3", "type": "partab", "stimulus": "A newspaper editorial argues that a mayor's tax proposal will 'destroy families and neighborhoods' without presenting data.", "stem": "Part B: Which detail best supports the answer to Part A?", "choices": ["It uses persuasive language to push a viewpoint", "It lists neutral numerical evidence", "It records a court ruling word for word", "It states a constitutional amendment"], "answer": [0]}], [{"id": "P6ADS2_Q03", "cs": "CS 7", "type": "mc", "stimulus": "The Supreme Court reviews a federal statute and concludes it violates the Constitution.", "stem": "Which principle is most directly being exercised?", "choices": ["judicial review", "popular sovereignty", "reserved powers", "executive privilege"], "answer": [0]}], [{"id": "P6ADS2_Q04", "cs": "CS 7", "type": "partab", "stimulus": "Congress creates a national institution not listed word for word in the Constitution, and a state attempts to tax it.", "stem": "Part A: Which case most strongly supports the national institution?", "choices": ["McCulloch v. Maryland", "Gibbons v. Ogden", "Marbury v. Madison", "Tinker v. Des Moines"], "answer": [0]}, {"id": "P6ADS2_Q05", "cs": "CS 7", "type": "partab", "stimulus": "Congress creates a national institution not listed word for word in the Constitution, and a state attempts to tax it.", "stem": "Part B: Which idea from that case best supports the answer?", "choices": ["Implied powers allow necessary national action and states cannot destroy valid federal institutions", "States may ignore national laws whenever they disagree", "Courts may write new amendments", "Local governments control national finance"], "answer": [0]}], [{"id": "P6ADS2_Q06", "cs": "CS 16", "type": "mc", "stimulus": "Residents debate whether a new traffic pattern should be adopted near a downtown business district.", "stem": "Which level of government is most directly involved first?", "choices": ["local government", "federal government", "international organization", "state legislature only"], "answer": [0]}], [{"id": "P6ADS2_Q07", "cs": "CS 1", "type": "partab", "stimulus": "Under the Articles of Confederation, the national government struggled to raise funds and enforce major decisions.", "stem": "Part A: What broader conclusion is best supported?", "choices": ["The Articles created a weak national framework", "The Articles created an overly strong president", "The Articles eliminated state power", "The Articles gave courts too much authority"], "answer": [0]}, {"id": "P6ADS2_Q08", "cs": "CS 1", "type": "partab", "stimulus": "Under the Articles of Confederation, the national government struggled to raise funds and enforce major decisions.", "stem": "Part B: Which detail best supports that conclusion?", "choices": ["The national government lacked reliable power to solve national problems", "The president vetoed too many bills", "The Supreme Court rejected too many laws", "Local governments made all foreign treaties"], "answer": [0]}], [{"id": "P6ADS2_Q09", "cs": "CS 2", "type": "mc", "stimulus": "A political philosopher argues that rulers are legitimate only when citizens grant them authority.", "stem": "Which constitutional principle is most directly connected to that view?", "choices": ["consent of the governed / social contract", "judicial review", "reserved powers", "executive privilege"], "answer": [0]}], [{"id": "P6ADS2_Q10", "cs": "CS 2", "type": "mc", "stimulus": "Citizens remove officeholders through elections after those officials ignore public opinion.", "stem": "Which idea is best illustrated?", "choices": ["popular sovereignty", "federal supremacy", "incorporation", "term limits"], "answer": [0]}], [{"id": "P6ADS2_Q11", "cs": "CS 6", "type": "partab", "stimulus": "A state passes shipping rules that interfere with a congressional law regulating commerce across state lines.", "stem": "Part A: Which level of government has the stronger constitutional claim?", "choices": ["federal government", "state government", "county government", "school district"], "answer": [0]}, {"id": "P6ADS2_Q12", "cs": "CS 6", "type": "partab", "stimulus": "A state passes shipping rules that interfere with a congressional law regulating commerce across state lines.", "stem": "Part B: Which detail best supports the answer to Part A?", "choices": ["The issue concerns interstate commerce", "The issue concerns a local park permit", "The issue concerns a school lunch menu", "The issue concerns township signage"], "answer": [0]}], [{"id": "P6ADS2_Q13", "cs": "CS 15", "type": "mc", "stimulus": "A citizen researches a ballot issue and then casts a vote.", "stem": "Which democratic function is most clearly shown?", "choices": ["civic participation linked to self-government", "judicial review", "executive enforcement", "federal supremacy"], "answer": [0]}], [{"id": "P6ADS2_Q14", "cs": "CS 15", "type": "mc", "stimulus": "A person follows the news closely but never takes public action.", "stem": "Which statement is most accurate?", "choices": ["Awareness is not the same as direct civic participation", "Following the news automatically counts as voting", "The person is exercising judicial review", "The person is setting monetary policy"], "answer": [0]}], [{"id": "P6ADS2_Q15", "cs": "CS 21", "type": "mc", "stimulus": "The Federal Reserve lowers interest rates and buys government securities.", "stem": "What overall stance is the Fed most likely taking?", "choices": ["expansionary monetary policy", "contractionary monetary policy", "contractionary fiscal policy", "judicial activism"], "answer": [0]}], [{"id": "P6ADS2_Q16", "cs": "CS 21", "type": "multi", "stem": "Select TWO actions that would most likely tighten credit.", "choices": ["raise reserve requirements", "sell government securities", "cut taxes", "increase federal spending"], "answer": [0, 1]}], [{"id": "P6ADS2_Q17", "cs": "CS 9", "type": "mc", "stimulus": "A state law is challenged because it denies one group equal treatment under the law.", "stem": "Which amendment is most directly involved?", "choices": ["Fourteenth Amendment", "Third Amendment", "Seventh Amendment", "Tenth Amendment"], "answer": [0]}], [{"id": "P6ADS2_Q18", "cs": "CS 9", "type": "partab", "stimulus": "A state policy is challenged for violating equal protection.", "stem": "Part A: Why is the Fourteenth Amendment central to this dispute?", "choices": ["It applies equal protection and due process to state governments", "It creates local governments", "It gives Congress direct control over all elections", "It establishes the Federal Reserve"], "answer": [0]}, {"id": "P6ADS2_Q19", "cs": "CS 9", "type": "partab", "stimulus": "A state policy is challenged for violating equal protection.", "stem": "Part B: Which detail best supports the answer to Part A?", "choices": ["The challenged action comes from a state government", "The challenged action comes from a newspaper editorial", "The challenged action comes from a private family rule", "The challenged action comes from a foreign treaty"], "answer": [0]}], [{"id": "P6ADS2_Q20", "cs": "CS 7", "type": "mc", "stimulus": "A state grants one company exclusive control over transportation between two states.", "stem": "Which precedent most strongly supports striking down the state action?", "choices": ["Gibbons v. Ogden", "McCulloch v. Maryland", "Marbury v. Madison", "Gideon v. Wainwright"], "answer": [0]}], [{"id": "P6ADS2_Q21", "cs": "CS 21", "type": "mc", "stimulus": "The Federal Reserve raises reserve requirements to slow inflation.", "stem": "What is the most likely immediate effect?", "choices": ["Banks will have less money available to lend", "Congress will spend more money", "Local governments will gain treaty power", "Courts will change tax rates"], "answer": [0]}], [{"id": "P6ADS2_Q22", "cs": "CS 1", "type": "mc", "stimulus": "Delegates replaced the Articles of Confederation with the Constitution.", "stem": "Which evaluation is most accurate?", "choices": ["They sought a stronger but still limited national framework", "They wanted to eliminate federalism entirely", "They intended to end representative government", "They wanted courts to control taxation alone"], "answer": [0]}], [{"id": "P6ADS2_Q23", "cs": "CS 6", "type": "mc", "stimulus": "A governor argues that states should handle road maintenance, while Congress regulates air traffic nationwide.", "stem": "Which conclusion is best supported?", "choices": ["Different levels of government handle different policy roles within federalism", "States control all national policy", "The federal government controls every local issue", "Local governments regulate international treaties"], "answer": [0]}], [{"id": "P6ADS2_Q24", "cs": "CS 3", "type": "mc", "stimulus": "A student compares an editorial with a labor statistics report to study unemployment.", "stem": "Which source is better for numerical evidence?", "choices": ["labor statistics report", "editorial", "both equally", "neither"], "answer": [0]}], [{"id": "P6ADS2_Q25", "cs": "CS 16", "type": "mc", "stimulus": "Citizens attend a city planning meeting to debate a downtown zoning change.", "stem": "Which level of government is most directly involved?", "choices": ["local", "federal", "international", "judicial"], "answer": [0]}], [{"id": "P6ADS2_Q26", "cs": "CS 2", "type": "mc", "stimulus": "A ruler claims authority without elections, accountability, or public consent.", "stem": "Which principle is most clearly violated?", "choices": ["consent of the governed", "judicial review", "checks and balances", "implied powers"], "answer": [0]}], [{"id": "P6ADS2_Q27", "cs": "CS 15", "type": "partab", "stimulus": "Two citizens follow the same public issue. One only reads about it; the other also votes on a levy.", "stem": "Part A: Which citizen is demonstrating direct civic participation?", "choices": ["the citizen who votes on the levy", "the citizen who only reads about it", "both equally", "neither"], "answer": [0]}, {"id": "P6ADS2_Q28", "cs": "CS 15", "type": "partab", "stimulus": "Two citizens follow the same public issue. One only reads about it; the other also votes on a levy.", "stem": "Part B: Which detail best supports the answer to Part A?", "choices": ["Voting is direct participation in representative government", "Reading automatically changes public policy", "Only courts count as civic action", "Following the news is the same as casting a ballot"], "answer": [0]}], [{"id": "P6ADS2_Q29", "cs": "CS 21", "type": "mc", "stimulus": "Congress cuts taxes while the Federal Reserve also lowers rates.", "stem": "Which statement is most accurate?", "choices": ["Fiscal and monetary policy can both be used to stimulate the economy", "Only Congress influences economic activity", "Only the Federal Reserve can change demand", "The two policies cancel each other automatically"], "answer": [0]}], [{"id": "P6ADS2_Q30", "cs": "CS 7", "type": "mc", "stimulus": "A law is challenged, and the Supreme Court decides whether it fits the Constitution.", "stem": "Why is this power important?", "choices": ["It helps maintain constitutional limits on government", "It allows the Court to write tax policy", "It lets states ignore federal law", "It replaces the need for elections"], "answer": [0]}]];

function hash32(str){ let h=2166136261>>>0; for(let i=0;i<str.length;i++){ h^=str.charCodeAt(i); h=Math.imul(h,16777619); } return h>>>0; }
function mulberry32(a){ return function(){ let t = a += 0x6D2B79F5; t=Math.imul(t^(t>>>15), t|1); t^=t+Math.imul(t^(t>>>7), t|61); return ((t^(t>>>14))>>>0)/4294967296; }; }
function shuffleBlocks(blocks, seedStr){ const a=blocks.slice(), rand=mulberry32(hash32(seedStr)); for(let i=a.length-1;i>0;i--){ const j=Math.floor(rand()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function shuffleIndices(length, seedStr){ const arr=Array.from({length},(_,i)=>i), rand=mulberry32(hash32(seedStr)); for(let i=arr.length-1;i>0;i--){ const j=Math.floor(rand()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }
function remapQuestionChoices(question, seedStr){
  if(!Array.isArray(question.choices) || question.choices.length < 2) return {...question};
  const order = shuffleIndices(question.choices.length, seedStr);
  const newChoices = order.map(i => question.choices[i]);
  const inverseMap = {};
  order.forEach((oldIdx, newIdx) => inverseMap[oldIdx] = newIdx);
  let newAnswer = question.answer;
  if(Array.isArray(question.answer)) newAnswer = question.answer.map(oldIdx => inverseMap[oldIdx]).sort((a,b)=>a-b);
  return {...question, choices:newChoices, answer:newAnswer, _choiceOrder:order};
}

let QUESTIONS = [];
let state = { studentName:"", startedAt:null, current:0, answers:[], submitted:false, score:null, attemptNumber:1, questionOrderSeed:null };

function escapeHtml(str){ return String(str ?? "").replace(/[&<>"']/g, s => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[s])); }
function nowLocalString(d){ return new Date(d).toLocaleString(); }
function formatRuntime(seconds){ const m=Math.floor(seconds/60).toString().padStart(2,"0"); const s=Math.floor(seconds%60).toString().padStart(2,"0"); return `${m}:${s}`; }
function letter(i){ return ["A","B","C","D","E","F"][i] || ""; }
function sameArray(a,b){ return Array.isArray(a) && Array.isArray(b) && a.length===b.length && a.every((v,i)=>v===b[i]); }
function normalizeMulti(arr){ return [...arr].sort((a,b)=>a-b); }
function isCorrect(q, answer){ if(q.type==="multi") return Array.isArray(answer) && sameArray(normalizeMulti(answer), normalizeMulti(q.answer)); return Array.isArray(answer) && sameArray(answer, q.answer); }
function buildQuestions(){
  const seed = state.questionOrderSeed || "default-seed";
  const shuffledBlocks = shuffleBlocks(QUESTION_BLOCKS, `${seed}|block-order`);
  QUESTIONS = shuffledBlocks.flat().map((q, idx) => remapQuestionChoices(q, `${seed}|${q.id || idx}|choices`));
  if(!Array.isArray(state.answers) || state.answers.length !== QUESTIONS.length) state.answers = Array(QUESTIONS.length).fill(null);
}
function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function load(){ try{ const raw=localStorage.getItem(STORAGE_KEY); if(raw){ const parsed=JSON.parse(raw); if(parsed && !parsed.submitted) state=parsed; } }catch(err){} }
function hardRestart(){ localStorage.removeItem(STORAGE_KEY); if(TEACHER_OVERRIDE) localStorage.removeItem(ATTEMPT_KEY); location.reload(); }
function countAnswered(){ return state.answers.filter(a => a !== null).length; }
function isLocked(){ if(TEACHER_OVERRIDE) return false; return localStorage.getItem(ATTEMPT_KEY) === "USED"; }
function teacherBadge(){ return TEACHER_OVERRIDE ? `<span class="pill">Teacher Override Active</span>` : ``; }
function buildLockedScreen(){ document.getElementById("app").innerHTML = `<a class="back-link" href="../index.html">← Back to Hub</a><div class="panel lock-box"><div class="kicker">Attempt Locked</div><h1>${TEST_META.title}</h1><p class="sub">This segment has already been completed on this device/browser.</p><div class="footer-actions">${TEACHER_OVERRIDE ? `<button class="warn" onclick="teacherUnlockNow()">Teacher Unlock This Browser</button>` : ``}<button onclick="location.href='../index.html'">Back to Hub</button></div></div>`; }
function teacherUnlockNow(){ localStorage.removeItem(ATTEMPT_KEY); localStorage.removeItem(STORAGE_KEY); location.reload(); }
function buildIntro(){
  document.getElementById("app").innerHTML = `<a class="back-link" href="../index.html">← Back to Hub</a><div class="panel name-card"><div class="kicker">Legend Mastery Series • Government</div><h1>${TEST_META.title}</h1><p class="sub">30-question OST-style segment. Name is required to begin. One attempt only.</p><input id="nameInput" class="input" type="text" maxlength="60" placeholder="Enter your name to begin" /><div class="help">Advanced application-focused Day 2 segment for Period 6. Part A / Part B items stay together, evidence matters, and the questions push students to explain why a constitutional principle applies instead of only naming it.</div><div class="footer-actions">${TEACHER_OVERRIDE ? `<span class="tag">Teacher Override Active</span>` : ``}<button id="startBtn">Start Test</button></div></div>`;
  document.getElementById("startBtn").onclick = () => {
    const name=document.getElementById("nameInput").value.trim();
    if(!name){ alert("Enter your name to begin."); return; }
    state.studentName=name; state.startedAt=new Date().toISOString(); state.attemptNumber=1;
    state.questionOrderSeed=`${state.studentName}|${state.startedAt}|${TEST_META.title}`; buildQuestions(); save(); renderTest();
  };
}
function buildTopbar(){
  const started=new Date(state.startedAt), runtime=formatRuntime((Date.now()-started.getTime())/1000), answered=countAnswered(), progressPct=Math.round((answered/QUESTIONS.length)*100);
  return `<a class="back-link" href="../index.html">← Back to Hub</a><div class="topbar"><div class="topbar-left"><button class="danger" onclick="hardRestart()">Restart Test</button></div><div class="topbar-right">${teacherBadge()}<span class="pill">Name: ${escapeHtml(state.studentName)}</span><span class="pill">Attempt: ${state.attemptNumber}</span><span class="pill">Started: ${escapeHtml(nowLocalString(started))}</span><span class="pill">Runtime: <span id="runtimeDisplay">${runtime}</span></span></div></div><div class="panel"><div class="stats"><div class="stat"><div class="stat-label">Test</div><div class="stat-value">${TEST_META.day} ${TEST_META.segment}</div></div><div class="stat"><div class="stat-label">Focus</div><div class="stat-value">${TEST_META.focus}</div></div><div class="stat"><div class="stat-label">Progress</div><div class="stat-value">${answered} / ${QUESTIONS.length}</div></div><div class="stat"><div class="stat-label">Completion</div><div class="stat-value">${progressPct}%</div></div></div><div class="progress-wrap"><div class="progress-bar" style="width:${progressPct}%"></div></div></div>`;
}
function renderQuestion(){
  const q=QUESTIONS[state.current], currentAnswer=state.answers[state.current], multi=q.type==="multi";
  document.getElementById("app").innerHTML = buildTopbar() + `
    <div class="panel question-card">
      <div class="q-type">Question ${state.current + 1} of ${QUESTIONS.length} • ${q.type.toUpperCase()} • ${q.cs}</div>
      ${q.stimulus ? `<div class="stimulus">${escapeHtml(q.stimulus)}</div>` : ``}
      <div class="q-stem">${escapeHtml(q.stem)}</div>
      ${multi ? `<p class="multi-note">Select all correct answers, then press Confirm Selection.</p>` : ``}
      <div class="choices">
        ${q.choices.map((choice, i) => { const selected = Array.isArray(currentAnswer) && currentAnswer.includes(i); return `<button class="choice ${selected ? "selected" : ""}" onclick="${multi ? `toggleMulti(${i})` : `selectSingle(${i})`}"><span class="choice-letter">${letter(i)}.</span> ${escapeHtml(choice)}</button>`; }).join("")}
      </div>
      <div class="footer-actions">
        <button class="secondary" ${state.current === 0 ? "disabled" : ""} onclick="prevQuestion()">Previous</button>
        <button class="secondary" onclick="skipQuestion()">Skip</button>
        ${multi ? `<button onclick="confirmMulti()">Confirm Selection</button>` : ``}
        <button class="warn" onclick="reviewScreen()">Review / Submit</button>
      </div>
    </div>`;
}
function renderTest(){ if(state.current<0) state.current=0; if(state.current>=QUESTIONS.length) state.current=QUESTIONS.length-1; renderQuestion(); }
function selectSingle(i){ state.answers[state.current]=[i]; save(); if(state.current<QUESTIONS.length-1){ state.current++; save(); renderQuestion(); } else { reviewScreen(); } }
function toggleMulti(i){ const current=Array.isArray(state.answers[state.current]) ? [...state.answers[state.current]] : []; const idx=current.indexOf(i); if(idx>=0) current.splice(idx,1); else current.push(i); state.answers[state.current]=current; save(); renderQuestion(); }
function confirmMulti(){ const current=state.answers[state.current]; if(!Array.isArray(current) || current.length===0){ alert("Select at least one answer before confirming."); return; } if(state.current<QUESTIONS.length-1){ state.current++; save(); renderQuestion(); } else { reviewScreen(); } }
function prevQuestion(){ if(state.current>0){ state.current--; save(); renderQuestion(); } }
function skipQuestion(){ if(state.current<QUESTIONS.length-1){ state.current++; save(); renderQuestion(); } else { reviewScreen(); } }
function jumpToQuestion(idx){ state.current=idx; save(); renderQuestion(); }
function reviewScreen(){
  const answered=countAnswered(), unanswered=QUESTIONS.length-answered;
  document.getElementById("app").innerHTML = buildTopbar() + `<div class="panel"><h2>Review Before Submitting</h2><p class="sub">Answered: ${answered} of ${QUESTIONS.length}. Unanswered: ${unanswered}.</p><div class="review-box">${QUESTIONS.map((q, idx) => { const ans=state.answers[idx]; const answerText=!ans ? "No answer" : q.type==="multi" ? "Answered: " + normalizeMulti(ans).map(v => letter(v)).join(", ") : "Answered: " + letter(ans[0]); return `<div class="review-item"><div class="review-top"><strong>Q${String(idx + 1).padStart(2,"0")}</strong><span class="tag">${q.cs}</span></div><div class="muted">${escapeHtml(q.stem)}</div><div style="margin-top:8px;"><span class="tag">${answerText}</span></div><div class="footer-actions"><button class="secondary" onclick="jumpToQuestion(${idx})">Go to Question</button></div></div>`; }).join("")}</div><hr class="sep"><div class="footer-actions"><button class="secondary" onclick="renderQuestion()">Back to Test</button><button onclick="submitTest()">Submit Segment</button></div></div>`;
}
async function submitTest(){
  if(state.submitted) return;
  const endedAt=new Date().toISOString();
  const score=QUESTIONS.reduce((sum, q, idx) => sum + (isCorrect(q, state.answers[idx]) ? 1 : 0), 0);
  const accuracy=Math.round((score/QUESTIONS.length)*100);
  const payload={ studentName:state.studentName, subject:TEST_META.subject, week:TEST_META.week, day:TEST_META.day, segment:TEST_META.segment, title:TEST_META.title, focus:TEST_META.focus, startedAt:state.startedAt, endedAt, runtimeSeconds:Math.round((new Date(endedAt)-new Date(state.startedAt))/1000), score, total:QUESTIONS.length, accuracy, attemptNumber:state.attemptNumber, questions:QUESTIONS.map((q, idx) => ({ id:q.id, cs:q.cs, type:q.type, stem:q.stem, correctAnswer:q.answer, studentAnswer:state.answers[idx], correct:isCorrect(q, state.answers[idx]) ? 1 : 0 })) };
  try{ await fetch(SCRIPT_URL, { method:"POST", headers:{"Content-Type":"text/plain;charset=utf-8"}, body:JSON.stringify(payload) }); }catch(err){}
  state.submitted=true; state.score=score; save(); localStorage.setItem(ATTEMPT_KEY, "USED"); renderResult(score, accuracy, endedAt);
}
function renderResult(score, accuracy, endedAt){
  const started=new Date(state.startedAt), ended=new Date(endedAt);
  document.getElementById("app").innerHTML = `<a class="back-link" href="../index.html">← Back to Hub</a><div class="panel"><div class="kicker">Submission Complete</div><h1>${escapeHtml(state.studentName)} — ${TEST_META.title}</h1><p class="sub">This attempt is now locked on this browser.</p><div class="stats"><div class="stat"><div class="stat-label">Score</div><div class="stat-value">${score} / ${QUESTIONS.length}</div></div><div class="stat"><div class="stat-label">Accuracy</div><div class="stat-value">${accuracy}%</div></div><div class="stat"><div class="stat-label">Started</div><div class="stat-value">${escapeHtml(nowLocalString(started))}</div></div><div class="stat"><div class="stat-label">Finished</div><div class="stat-value">${escapeHtml(nowLocalString(ended))}</div></div></div><div class="footer-actions"><button onclick="location.href='../index.html'">Back to Hub</button></div></div>`;
}
function tickRuntime(){ const el=document.getElementById("runtimeDisplay"); if(el && state.startedAt) el.textContent = formatRuntime((Date.now() - new Date(state.startedAt).getTime())/1000); }
load();
if(isLocked()) buildLockedScreen();
else if(state.studentName && state.startedAt){ buildQuestions(); renderTest(); setInterval(tickRuntime, 1000); }
else buildIntro();
</script>
</body>
</html>
