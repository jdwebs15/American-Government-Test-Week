<html lang="en">
<head>
  <meta charset="utf-8" />

<body>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw3LxbT3Hm4VMrdZ9V7soijQ_rdOWVoALxAeq7HyAftiTqNmH8zDLUdjfkwhJDo0HY4/exec";

const TEST_META = {
  subject: "Government",
  week: "Test Week",
  day: "Day 2",
  segment: "Segment 1",
  title: "Government Test Week — Period 6 Group 3 Advanced Segment 1",
  focus: "Advanced Recognition and Mixed Framing"
};

const ATTEMPT_KEY = "GOV_P6_D2_ADV_S1_ATTEMPT_LOCK";
const STORAGE_KEY = "LEGEND_GOV_P6_D2_ADV_S1_STATE_V1";
const TEACHER_SECRET = "legend";
const TEACHER_OVERRIDE = new URLSearchParams(location.search).get("unlock") === TEACHER_SECRET;

const QUESTION_BANK = [{"id": "P6ADS1_Q01", "cs": "CS 3", "type": "mc", "stem": "A source uses loaded language, selective facts, and a recommendation for public action. It is best classified as", "choices": ["an editorial", "a neutral statistical chart", "a constitutional clause", "an official transcript"], "answer": [0]}, {"id": "P6ADS1_Q02", "cs": "CS 3", "type": "mc", "stem": "Which source would require the most caution because its main purpose is persuasion rather than neutral reporting?", "choices": ["campaign editorial", "census table", "budget spreadsheet", "court docket"], "answer": [0]}, {"id": "P6ADS1_Q03", "cs": "CS 7", "type": "mc", "stem": "Which case most directly explains why the Supreme Court can invalidate a law that conflicts with the Constitution?", "choices": ["Marbury v. Madison", "McCulloch v. Maryland", "Gibbons v. Ogden", "United States v. Nixon"], "answer": [0]}, {"id": "P6ADS1_Q04", "cs": "CS 7", "type": "mc", "stem": "Congress creates a policy tool not listed word for word in the Constitution. Which concept best defends that action?", "choices": ["implied powers", "reserved powers", "state nullification", "local initiative"], "answer": [0]}, {"id": "P6ADS1_Q05", "cs": "CS 7", "type": "mc", "stem": "A state attempts to monopolize navigation between two states. Which precedent most strongly supports federal intervention?", "choices": ["Gibbons v. Ogden", "Marbury v. Madison", "McCulloch v. Maryland", "Tinker v. Des Moines"], "answer": [0]}, {"id": "P6ADS1_Q06", "cs": "CS 16", "type": "mc", "stem": "Which office is most directly associated with local rather than state or federal government?", "choices": ["city council member", "U.S. senator", "governor", "Supreme Court justice"], "answer": [0]}, {"id": "P6ADS1_Q07", "cs": "CS 16", "type": "mc", "stem": "A zoning dispute over a new neighborhood business would most likely be handled first by", "choices": ["local government", "the federal cabinet", "the U.S. Senate", "the state supreme court only"], "answer": [0]}, {"id": "P6ADS1_Q08", "cs": "CS 1", "type": "mc", "stem": "Which weakness of the Articles of Confederation most clearly helped lead to the Constitutional Convention?", "choices": ["the national government lacked sufficient power to govern effectively", "the presidency was too dominant", "courts held too much power", "local governments had been abolished"], "answer": [0]}, {"id": "P6ADS1_Q09", "cs": "CS 1", "type": "mc", "stem": "Compared with the Articles of Confederation, the Constitution most clearly", "choices": ["strengthened the national framework while preserving federalism", "ended state authority", "eliminated representative government", "removed checks on power"], "answer": [0]}, {"id": "P6ADS1_Q10", "cs": "CS 2", "type": "mc", "stem": "Which statement is most consistent with the principle that government derives legitimacy from the governed?", "choices": ["Political authority depends on the consent of the people", "Courts may rule without constitutional limits", "States may ignore national law whenever they disagree", "Leaders hold authority by inheritance"], "answer": [0]}, {"id": "P6ADS1_Q11", "cs": "CS 2", "type": "mc", "stem": "Which modern example best reflects social contract theory?", "choices": ["Citizens remove leaders through constitutional elections", "A court cites precedent in a ruling", "Congress regulates interstate trucking", "The media covers a candidate debate"], "answer": [0]}, {"id": "P6ADS1_Q12", "cs": "CS 6", "type": "mc", "stem": "A conflict over whether immigration enforcement should be directed mainly by national officials or state officials is fundamentally a debate about", "choices": ["federalism", "judicial review", "popular sovereignty", "due process"], "answer": [0]}, {"id": "P6ADS1_Q13", "cs": "CS 6", "type": "mc", "stem": "Which policy area is most likely to remain primarily national rather than local or state?", "choices": ["treaties with foreign nations", "city zoning rules", "county road repair", "school district attendance zones"], "answer": [0]}, {"id": "P6ADS1_Q14", "cs": "CS 15", "type": "mc", "stem": "Which action is the clearest example of direct civic participation in representative government?", "choices": ["casting a ballot in an election", "reading an editorial", "watching a debate", "following a news story"], "answer": [0]}, {"id": "P6ADS1_Q15", "cs": "CS 15", "type": "mc", "stem": "Why is voter participation politically significant in a constitutional republic?", "choices": ["It connects popular sovereignty to government decision-making", "It allows courts to create new laws", "It transfers all power to the states", "It replaces the need for elected officials"], "answer": [0]}, {"id": "P6ADS1_Q16", "cs": "CS 21", "type": "mc", "stem": "Which Federal Reserve action would most likely tighten credit and slow spending?", "choices": ["raising reserve requirements", "buying government securities", "lowering the discount rate", "cutting payroll taxes"], "answer": [0]}, {"id": "P6ADS1_Q17", "cs": "CS 21", "type": "mc", "stem": "Which action belongs to monetary policy rather than fiscal policy?", "choices": ["lowering interest rates", "raising federal spending", "cutting income taxes", "issuing a state budget"], "answer": [0]}, {"id": "P6ADS1_Q18", "cs": "CS 9", "type": "mc", "stem": "The Fourteenth Amendment is often central in cases involving state governments because it", "choices": ["applies due process and equal protection at the state level", "creates the Electoral College", "establishes judicial review", "gives Congress power over all local policy"], "answer": [0]}, {"id": "P6ADS1_Q19", "cs": "CS 9", "type": "mc", "stem": "A state policy challenged as unfairly targeting one group would most likely be tested under the", "choices": ["Equal Protection Clause", "Necessary and Proper Clause", "Establishment Clause", "Ex Post Facto Clause"], "answer": [0]}, {"id": "P6ADS1_Q20", "cs": "CS 7", "type": "mc", "stem": "Which case is the strongest precedent for the idea that states cannot tax or destroy valid federal institutions?", "choices": ["McCulloch v. Maryland", "Gibbons v. Ogden", "Marbury v. Madison", "New Jersey v. T.L.O."], "answer": [0]}, {"id": "P6ADS1_Q21", "cs": "CS 3", "type": "mc", "stem": "Which source would be most useful if a student wanted numerical evidence rather than opinion about unemployment?", "choices": ["labor statistics report", "editorial column", "campaign speech", "op-ed blog"], "answer": [0]}, {"id": "P6ADS1_Q22", "cs": "CS 6", "type": "mc", "stem": "Which example best illustrates federal supremacy within a federal system?", "choices": ["A federal law overrides a conflicting state law in an area of national authority", "A county board approves a zoning permit", "A school district adopts a calendar", "A mayor vetoes a city ordinance"], "answer": [0]}, {"id": "P6ADS1_Q23", "cs": "CS 21", "type": "mc", "stem": "If the Federal Reserve buys government securities, the most likely immediate effect is that", "choices": ["banks have more funds available to lend", "Congress automatically reduces the deficit", "state governments gain treaty power", "tax rates rise without congressional action"], "answer": [0]}, {"id": "P6ADS1_Q24", "cs": "CS 1", "type": "mc", "stem": "Which description best captures why the Constitution replaced the Articles of Confederation?", "choices": ["The earlier framework was too weak to solve major national problems", "The earlier framework centralized too much military power in the presidency", "The earlier framework abolished state governments", "The earlier framework gave judges the exclusive power to tax"], "answer": [0]}, {"id": "P6ADS1_Q25", "cs": "CS 2", "type": "mc", "stem": "A government claiming authority without the consent of the governed would contradict", "choices": ["social contract theory", "judicial review", "checks and balances", "federalism"], "answer": [0]}, {"id": "P6ADS1_Q26", "cs": "CS 16", "type": "mc", "stem": "Which question would most likely be decided at the local level first?", "choices": ["Where should a new stoplight be installed?", "Should the nation join a defense treaty?", "How should interstate air traffic be regulated?", "What should the federal reserve requirement be?"], "answer": [0]}, {"id": "P6ADS1_Q27", "cs": "CS 15", "type": "mc", "stem": "Which action goes beyond awareness and enters the category of civic participation?", "choices": ["voting in a school levy election", "reading a candidate biography", "watching a legislative hearing", "following a policy podcast"], "answer": [0]}, {"id": "P6ADS1_Q28", "cs": "CS 7", "type": "mc", "stem": "Which constitutional development most directly came from Marbury v. Madison?", "choices": ["the judiciary's authority to review constitutionality", "Congressional power over interstate trade", "state power to tax federal institutions", "the presidential veto"], "answer": [0]}, {"id": "P6ADS1_Q29", "cs": "CS 9", "type": "mc", "stem": "Which scenario most clearly raises an equal protection question?", "choices": ["A state gives different legal treatment to similarly situated groups", "Congress debates a highway budget", "The Federal Reserve changes rates", "A mayor proposes a new park"], "answer": [0]}, {"id": "P6ADS1_Q30", "cs": "CS 21", "type": "mc", "stem": "Which pairing is accurate?", "choices": ["Federal Reserve — monetary policy", "Congress — reserve requirements", "Supreme Court — discount rate", "State legislature — open market operations"], "answer": [0]}];

function hash32(str){
  let h = 2166136261 >>> 0;
  for(let i = 0; i < str.length; i++){ h ^= str.charCodeAt(i); h = Math.imul(h, 16777619); }
  return h >>> 0;
}
function mulberry32(a){
  return function(){
    let t = a += 0x6D2B79F5;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function shuffleArray(arr, seedStr){
  const a = arr.slice();
  const rand = mulberry32(hash32(seedStr));
  for(let i = a.length - 1; i > 0; i--){ const j = Math.floor(rand() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}
function shuffleIndices(length, seedStr){
  const arr = Array.from({length}, (_, i) => i);
  const rand = mulberry32(hash32(seedStr));
  for(let i = arr.length - 1; i > 0; i--){ const j = Math.floor(rand() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; }
  return arr;
}
function remapQuestionChoices(question, seedStr){
  if(!Array.isArray(question.choices) || question.choices.length < 2) return {...question};
  const order = shuffleIndices(question.choices.length, seedStr);
  const newChoices = order.map(i => question.choices[i]);
  const inverseMap = {};
  order.forEach((oldIdx, newIdx) => inverseMap[oldIdx] = newIdx);
  let newAnswer = question.answer;
  if(Array.isArray(question.answer)){ newAnswer = question.answer.map(oldIdx => inverseMap[oldIdx]).sort((a,b)=>a-b); }
  return { ...question, choices:newChoices, answer:newAnswer, _choiceOrder:order };
}

let QUESTIONS = [];
let state = { studentName:"", startedAt:null, current:0, answers:[], submitted:false, score:null, attemptNumber:1, questionOrderSeed:null };

function escapeHtml(str){
  return String(str ?? "").replace(/[&<>"']/g, s => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[s]));
}
function nowLocalString(d){ return new Date(d).toLocaleString(); }
function formatRuntime(seconds){ const m=Math.floor(seconds/60).toString().padStart(2,"0"); const s=Math.floor(seconds%60).toString().padStart(2,"0"); return `${m}:${s}`; }
function letter(i){ return ["A","B","C","D","E","F"][i] || ""; }
function sameArray(a,b){ return Array.isArray(a) && Array.isArray(b) && a.length===b.length && a.every((v,i)=>v===b[i]); }
function isCorrect(q, answer){ return Array.isArray(answer) && sameArray(answer, q.answer); }
function buildQuestions(){
  const seed = state.questionOrderSeed || "default-seed";
  QUESTIONS = QUESTION_BANK.map((q, idx) => remapQuestionChoices(q, `${seed}|${q.id || idx}|choices`));
  QUESTIONS = shuffleArray(QUESTIONS, `${seed}|question-order`);
  if(!Array.isArray(state.answers) || state.answers.length !== QUESTIONS.length) state.answers = Array(QUESTIONS.length).fill(null);
}
function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function load(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){ const parsed = JSON.parse(raw); if(parsed && !parsed.submitted) state = parsed; }
  } catch(err){}
}
function hardRestart(){ localStorage.removeItem(STORAGE_KEY); if(TEACHER_OVERRIDE) localStorage.removeItem(ATTEMPT_KEY); location.reload(); }
function countAnswered(){ return state.answers.filter(a => a !== null).length; }
function isLocked(){ if(TEACHER_OVERRIDE) return false; return localStorage.getItem(ATTEMPT_KEY) === "USED"; }
function teacherBadge(){ return TEACHER_OVERRIDE ? `<span class="pill">Teacher Override Active</span>` : ``; }
function buildLockedScreen(){
  document.getElementById("app").innerHTML = `
    <a class="back-link" href="../index.html">← Back to Hub</a>
    <div class="panel lock-box">
      <div class="kicker">Attempt Locked</div>
      <h1>${TEST_META.title}</h1>
      <p class="sub">This segment has already been completed on this device/browser.</p>
      <div class="footer-actions">
        ${TEACHER_OVERRIDE ? `<button class="warn" onclick="teacherUnlockNow()">Teacher Unlock This Browser</button>` : ``}
        <button onclick="location.href='../index.html'">Back to Hub</button>
      </div>
    </div>`;
}
function teacherUnlockNow(){ localStorage.removeItem(ATTEMPT_KEY); localStorage.removeItem(STORAGE_KEY); location.reload(); }
function buildIntro(){
  document.getElementById("app").innerHTML = `
    <a class="back-link" href="../index.html">← Back to Hub</a>
    <div class="panel name-card">
      <div class="kicker">Legend Mastery Series • Government</div>
      <h1>${TEST_META.title}</h1>
      <p class="sub">30-question OST-style segment. Name is required to begin. One attempt only.</p>
      <input id="nameInput" class="input" type="text" maxlength="60" placeholder="Enter your name to begin" />
      <div class="help">Advanced recognition-focused Day 2 segment for Period 6. This version keeps the wording tighter, mixes the framing, and asks strong students to separate correct constitutional reasoning from attractive trap language.</div>
      <div class="footer-actions">
        ${TEACHER_OVERRIDE ? `<span class="tag">Teacher Override Active</span>` : ``}
        <button id="startBtn">Start Test</button>
      </div>
    </div>`;
  document.getElementById("startBtn").onclick = () => {
    const name = document.getElementById("nameInput").value.trim();
    if(!name){ alert("Enter your name to begin."); return; }
    state.studentName = name;
    state.startedAt = new Date().toISOString();
    state.attemptNumber = 1;
    state.questionOrderSeed = `${state.studentName}|${state.startedAt}|${TEST_META.title}`;
    buildQuestions(); save(); renderTest();
  };
}
function buildTopbar(){
  const started = new Date(state.startedAt);
  const runtime = formatRuntime((Date.now() - started.getTime()) / 1000);
  const answered = countAnswered();
  const progressPct = Math.round((answered / QUESTIONS.length) * 100);
  return `
    <a class="back-link" href="../index.html">← Back to Hub</a>
    <div class="topbar">
      <div class="topbar-left">
        <button class="danger" onclick="hardRestart()">Restart Test</button>
      </div>
      <div class="topbar-right">
        ${teacherBadge()}
        <span class="pill">Name: ${escapeHtml(state.studentName)}</span>
        <span class="pill">Attempt: ${state.attemptNumber}</span>
        <span class="pill">Started: ${escapeHtml(nowLocalString(started))}</span>
        <span class="pill">Runtime: <span id="runtimeDisplay">${runtime}</span></span>
      </div>
    </div>
    <div class="panel">
      <div class="stats">
        <div class="stat"><div class="stat-label">Test</div><div class="stat-value">${TEST_META.day} ${TEST_META.segment}</div></div>
        <div class="stat"><div class="stat-label">Focus</div><div class="stat-value">${TEST_META.focus}</div></div>
        <div class="stat"><div class="stat-label">Progress</div><div class="stat-value">${answered} / ${QUESTIONS.length}</div></div>
        <div class="stat"><div class="stat-label">Completion</div><div class="stat-value">${progressPct}%</div></div>
      </div>
      <div class="progress-wrap"><div class="progress-bar" style="width:${progressPct}%"></div></div>
    </div>`;
}
function renderQuestion(){
  const q = QUESTIONS[state.current];
  const currentAnswer = state.answers[state.current];
  document.getElementById("app").innerHTML = buildTopbar() + `
    <div class="panel question-card">
      <div class="q-type">Question ${state.current + 1} of ${QUESTIONS.length} • ${q.type.toUpperCase()} • ${q.cs}</div>
      <div class="q-stem">${escapeHtml(q.stem)}</div>
      <div class="choices">
        ${q.choices.map((choice, i) => `
          <button class="choice ${currentAnswer !== null && currentAnswer[0] === i ? "selected" : ""}" onclick="selectChoice(${i})">
            <span class="choice-letter">${letter(i)}.</span> ${escapeHtml(choice)}
          </button>`).join("")}
      </div>
      <div class="footer-actions">
        <button class="secondary" ${state.current === 0 ? "disabled" : ""} onclick="prevQuestion()">Previous</button>
        <button class="secondary" onclick="skipQuestion()">Skip</button>
        <button class="warn" onclick="reviewScreen()">Review / Submit</button>
      </div>
    </div>`;
}
function renderTest(){ if(state.current < 0) state.current = 0; if(state.current >= QUESTIONS.length) state.current = QUESTIONS.length - 1; renderQuestion(); }
function selectChoice(i){ state.answers[state.current] = [i]; save(); if(state.current < QUESTIONS.length - 1){ state.current++; save(); renderQuestion(); } else { reviewScreen(); } }
function prevQuestion(){ if(state.current > 0){ state.current--; save(); renderQuestion(); } }
function skipQuestion(){ if(state.current < QUESTIONS.length - 1){ state.current++; save(); renderQuestion(); } else { reviewScreen(); } }
function jumpToQuestion(idx){ state.current = idx; save(); renderQuestion(); }
function reviewScreen(){
  const answered = countAnswered(); const unanswered = QUESTIONS.length - answered;
  document.getElementById("app").innerHTML = buildTopbar() + `
    <div class="panel">
      <h2>Review Before Submitting</h2>
      <p class="sub">Answered: ${answered} of ${QUESTIONS.length}. Unanswered: ${unanswered}.</p>
      <div class="review-box">
        ${QUESTIONS.map((q, idx) => `
          <div class="review-item">
            <div class="review-top"><strong>Q${String(idx + 1).padStart(2,"0")}</strong><span class="tag">${q.cs}</span></div>
            <div class="muted">${escapeHtml(q.stem)}</div>
            <div style="margin-top:8px;">${state.answers[idx] === null ? `<span class="tag">No answer</span>` : `<span class="tag">Answered: ${letter(state.answers[idx][0])}</span>`}</div>
            <div class="footer-actions"><button class="secondary" onclick="jumpToQuestion(${idx})">Go to Question</button></div>
          </div>`).join("")}
      </div>
      <hr class="sep">
      <div class="footer-actions">
        <button class="secondary" onclick="renderQuestion()">Back to Test</button>
        <button onclick="submitTest()">Submit Segment</button>
      </div>
    </div>`;
}
async function submitTest(){
  if(state.submitted) return;
  const endedAt = new Date().toISOString();
  const score = QUESTIONS.reduce((sum, q, idx) => sum + (isCorrect(q, state.answers[idx]) ? 1 : 0), 0);
  const accuracy = Math.round((score / QUESTIONS.length) * 100);
  const payload = {
    studentName: state.studentName, subject: TEST_META.subject, week: TEST_META.week, day: TEST_META.day, segment: TEST_META.segment,
    title: TEST_META.title, focus: TEST_META.focus, startedAt: state.startedAt, endedAt,
    runtimeSeconds: Math.round((new Date(endedAt) - new Date(state.startedAt)) / 1000), score, total: QUESTIONS.length, accuracy,
    attemptNumber: state.attemptNumber,
    questions: QUESTIONS.map((q, idx) => ({ id:q.id, cs:q.cs, type:q.type, stem:q.stem, correctAnswer:q.answer, studentAnswer:state.answers[idx], correct:isCorrect(q, state.answers[idx]) ? 1 : 0 }))
  };
  try {
    await fetch(SCRIPT_URL, { method:"POST", headers:{"Content-Type":"text/plain;charset=utf-8"}, body:JSON.stringify(payload) });
  } catch(err) {}
  state.submitted = true; state.score = score; save(); localStorage.setItem(ATTEMPT_KEY, "USED"); renderResult(score, accuracy, endedAt);
}
function renderResult(score, accuracy, endedAt){
  const started = new Date(state.startedAt);
  const ended = new Date(endedAt);
  document.getElementById("app").innerHTML = `
    <a class="back-link" href="../index.html">← Back to Hub</a>
    <div class="panel">
      <div class="kicker">Submission Complete</div>
      <h1>${escapeHtml(state.studentName)} — ${TEST_META.title}</h1>
      <p class="sub">This attempt is now locked on this browser.</p>
      <div class="stats">
        <div class="stat"><div class="stat-label">Score</div><div class="stat-value">${score} / ${QUESTIONS.length}</div></div>
        <div class="stat"><div class="stat-label">Accuracy</div><div class="stat-value">${accuracy}%</div></div>
        <div class="stat"><div class="stat-label">Started</div><div class="stat-value">${escapeHtml(nowLocalString(started))}</div></div>
        <div class="stat"><div class="stat-label">Finished</div><div class="stat-value">${escapeHtml(nowLocalString(ended))}</div></div>
      </div>
      <div class="footer-actions"><button onclick="location.href='../index.html'">Back to Hub</button></div>
    </div>`;
}
function tickRuntime(){ const el = document.getElementById("runtimeDisplay"); if(el && state.startedAt) el.textContent = formatRuntime((Date.now() - new Date(state.startedAt).getTime()) / 1000); }
load();
if(isLocked()) buildLockedScreen();
else if(state.studentName && state.startedAt){ buildQuestions(); renderTest(); setInterval(tickRuntime, 1000); }
else buildIntro();
</script>
</body>
</html>
