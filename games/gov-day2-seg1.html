<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Government Test Week — Day 2 Segment 1</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>
  <div class="wrap" id="app"></div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw3LxbT3Hm4VMrdZ9V7soijQ_rdOWVoALxAeq7HyAftiTqNmH8zDLUdjfkwhJDo0HY4/exec";

const TEST_META = {
  subject: "Government",
  week: "Test Week",
  day: "Day 2",
  segment: "Segment 1",
  title: "Government Test Week — Day 2 Segment 1",
  focus: "Recognition"
};

const ATTEMPT_KEY = "GOV_D2_S1_ATTEMPT_LOCK";
const STORAGE_KEY = "LEGEND_GOV_D2_S1_STATE_V1";
const TEACHER_SECRET = "legend";
const TEACHER_OVERRIDE = new URLSearchParams(location.search).get("unlock") === TEACHER_SECRET;

const QUESTION_BANK = [
  { id:"GOV_D2_S1_Q01", cs:"CS 1", type:"mc", stem:"Which statement best describes the purpose of the U.S. Constitution?", choices:["To explain court rulings","To establish the framework of government","To create political parties","To list Supreme Court cases"], answer:[1] },
  { id:"GOV_D2_S1_Q02", cs:"CS 2", type:"mc", stem:"The phrase “consent of the governed” is most closely tied to", choices:["social contract theory","executive privilege","judicial restraint","federal supremacy"], answer:[0] },
  { id:"GOV_D2_S1_Q03", cs:"CS 3", type:"mc", stem:"A transcript of court testimony would most likely provide", choices:["mainly personal opinion","specific facts from the event","campaign promises","future election results"], answer:[1] },
  { id:"GOV_D2_S1_Q04", cs:"CS 4", type:"mc", stem:"Which constitutional design feature is intended to keep government power limited?", choices:["Checks and balances","Direct democracy","Political patronage","Media coverage"], answer:[0] },

  { id:"GOV_D2_S1_Q05", cs:"CS 5", type:"mc", stem:"When citizens choose leaders in elections, which principle is most clearly shown?", choices:["Popular sovereignty","Judicial review","Federalism","Executive privilege"], answer:[0] },
  { id:"GOV_D2_S1_Q06", cs:"CS 5", type:"mc", stem:"A lawmaker says, “No official is above the law.” This idea reflects", choices:["Limited government","Reserved powers","Direct democracy","Party realignment"], answer:[0] },
  { id:"GOV_D2_S1_Q07", cs:"CS 5", type:"mc", stem:"Which principle is best illustrated by dividing authority among three branches?", choices:["Separation of powers","Incorporation","Federalism","Popular vote"], answer:[0] },

  { id:"GOV_D2_S1_Q08", cs:"CS 6", type:"mc", stem:"A conflict between a state law and a national law most directly involves", choices:["Federalism","Judicial activism","Campaign finance","Due process"], answer:[0] },
  { id:"GOV_D2_S1_Q09", cs:"CS 6", type:"mc", stem:"Which level of government would most directly negotiate treaties with other nations?", choices:["County","Municipal","State","Federal"], answer:[3] },

  { id:"GOV_D2_S1_Q10", cs:"CS 7", type:"mc", stem:"Which case is most closely tied to the idea that courts can strike down unconstitutional laws?", choices:["Marbury v. Madison","Gideon v. Wainwright","Mapp v. Ohio","Brown v. Board"], answer:[0] },
  { id:"GOV_D2_S1_Q11", cs:"CS 7", type:"mc", stem:"Which case most directly upheld congressional power over interstate commerce?", choices:["McCulloch v. Maryland","Gibbons v. Ogden","Miranda v. Arizona","Plessy v. Ferguson"], answer:[1] },
  { id:"GOV_D2_S1_Q12", cs:"CS 7", type:"mc", stem:"The idea that Congress may use powers not expressly listed in the Constitution is known as", choices:["implied powers","reserved powers","strict scrutiny","judicial restraint"], answer:[0] },

  { id:"GOV_D2_S1_Q13", cs:"CS 8", type:"mc", stem:"Which amendment is most directly tied to press, religion, speech, assembly, and petition?", choices:["1st","4th","5th","10th"], answer:[0] },
  { id:"GOV_D2_S1_Q14", cs:"CS 8", type:"mc", stem:"Which amendment is most directly associated with probable cause and warrants?", choices:["2nd","4th","6th","8th"], answer:[1] },
  { id:"GOV_D2_S1_Q15", cs:"CS 8", type:"mc", stem:"The constitutional protection against double jeopardy appears in the", choices:["4th Amendment","5th Amendment","6th Amendment","10th Amendment"], answer:[1] },

  { id:"GOV_D2_S1_Q16", cs:"CS 9", type:"mc", stem:"The due process and equal protection clauses are found in the", choices:["10th Amendment","12th Amendment","14th Amendment","19th Amendment"], answer:[2] },

  { id:"GOV_D2_S1_Q17", cs:"CS 10", type:"multi", stem:"Select TWO protections of the accused.", choices:["Impartial jury","Speedy trial","Unlimited free speech in school","Power to appoint judges"], answer:[0,1] },

  { id:"GOV_D2_S1_Q18", cs:"CS 11", type:"mc", stem:"Which branch appoints ambassadors and carries out foreign policy?", choices:["Legislative","Executive","Judicial","Local"], answer:[1] },
  { id:"GOV_D2_S1_Q19", cs:"CS 11", type:"mc", stem:"Which branch most directly interprets the Constitution in court cases?", choices:["Executive","Legislative","Judicial","Municipal"], answer:[2] },

  { id:"GOV_D2_S1_Q20", cs:"CS 12", type:"mc", stem:"Congress overriding a veto is an example of", choices:["checks and balances","popular sovereignty","federalism","incorporation"], answer:[0] },

  { id:"GOV_D2_S1_Q21", cs:"CS 13", type:"mc", stem:"One major function of political parties is to", choices:["declare laws unconstitutional","select candidates and organize platforms","print currency","enforce state laws"], answer:[1] },

  { id:"GOV_D2_S1_Q22", cs:"CS 14", type:"mc", stem:"An interest group is best described as an organization that", choices:["appoints judges","influences policy on behalf of an issue or group","counts electoral votes","enforces federal law"], answer:[1] },

  { id:"GOV_D2_S1_Q23", cs:"CS 15", type:"mc", stem:"Serving on a jury or voting in an election are examples of", choices:["civic participation","judicial review","executive action","implied powers"], answer:[0] },

  { id:"GOV_D2_S1_Q24", cs:"CS 16", type:"mc", stem:"Which institution is part of local government?", choices:["U.S. Senate","City council","Supreme Court","Cabinet"], answer:[1] },

  { id:"GOV_D2_S1_Q25", cs:"CS 17", type:"mc", stem:"Organizing neighbors to speak at a township meeting is an example of", choices:["civic engagement","judicial review","foreign policy","monetary policy"], answer:[0] },

  { id:"GOV_D2_S1_Q26", cs:"CS 18", type:"mc", stem:"A debate about what government should do about road safety is a", choices:["treaty issue","public policy issue","court appeal","constitutional amendment"], answer:[1] },

  { id:"GOV_D2_S1_Q27", cs:"CS 19", type:"mc", stem:"The media can influence government most directly by", choices:["setting the public agenda","issuing executive orders","declaring war","amending the Constitution"], answer:[0] },

  { id:"GOV_D2_S1_Q28", cs:"CS 20", type:"mc", stem:"Which term describes government decisions about taxation and spending?", choices:["Fiscal policy","Monetary policy","Judicial review","Federalism"], answer:[0] },
  { id:"GOV_D2_S1_Q29", cs:"CS 21", type:"mc", stem:"Which institution changes reserve requirements and interest rates?", choices:["Congress","Federal Reserve","Supreme Court","State legislature"], answer:[1] },

  { id:"GOV_D2_S1_Q30", cs:"CS 20", type:"multi", stem:"Select TWO examples of expansionary fiscal policy.", choices:["Cut taxes","Increase government spending","Raise reserve requirements","Raise interest rates"], answer:[0,1] }
];

function hash32(str){
  let h = 2166136261 >>> 0;
  for(let i = 0; i < str.length; i++){
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return h >>> 0;
}
function mulberry32(a){
  return function(){
    let t = a += 0x6D2B79F5;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function shuffleArray(arr, seedStr){
  const a = arr.slice();
  const rand = mulberry32(hash32(seedStr));
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(rand() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let QUESTIONS = [];

let state = {
  studentName: "",
  startedAt: null,
  current: 0,
  answers: [],
  submitted: false,
  score: null,
  attemptNumber: 1,
  questionOrderSeed: null
};

function escapeHtml(str){
  return String(str ?? "").replace(/[&<>"']/g, s => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[s]));
}
function nowLocalString(d){
  return new Date(d).toLocaleString();
}
function formatRuntime(seconds){
  const m = Math.floor(seconds / 60).toString().padStart(2,"0");
  const s = Math.floor(seconds % 60).toString().padStart(2,"0");
  return `${m}:${s}`;
}
function letter(i){
  return ["A","B","C","D","E","F"][i] || "";
}
function sameArray(a,b){
  return Array.isArray(a) && Array.isArray(b) && a.length === b.length && a.every((v,i)=>v===b[i]);
}
function normalizeMulti(arr){
  return [...arr].sort((a,b)=>a-b);
}
function isCorrect(q, answer){
  if(q.type === "multi"){
    return Array.isArray(answer) && sameArray(normalizeMulti(answer), normalizeMulti(q.answer));
  }
  return Array.isArray(answer) && sameArray(answer, q.answer);
}
function buildQuestions(){
  const seed = state.questionOrderSeed || "default-seed";
  QUESTIONS = shuffleArray(QUESTION_BANK, seed);
  if(!Array.isArray(state.answers) || state.answers.length !== QUESTIONS.length){
    state.answers = Array(QUESTIONS.length).fill(null);
  }
}
function save(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      if(parsed && !parsed.submitted){
        state = parsed;
      }
    }
  }catch(err){}
}
function hardRestart(){
  localStorage.removeItem(STORAGE_KEY);
  if(TEACHER_OVERRIDE){
    localStorage.removeItem(ATTEMPT_KEY);
  }
  location.reload();
}
function countAnswered(){
  return state.answers.filter(a => a !== null).length;
}
function isLocked(){
  if(TEACHER_OVERRIDE) return false;
  return localStorage.getItem(ATTEMPT_KEY) === "USED";
}
function teacherBadge(){
  return TEACHER_OVERRIDE ? `<span class="pill">Teacher Override Active</span>` : ``;
}
function buildLockedScreen(){
  document.getElementById("app").innerHTML = `
    <a class="back-link" href="../index.html">← Back to Hub</a>
    <div class="panel lock-box">
      <div class="kicker">Attempt Locked</div>
      <h1>${TEST_META.title}</h1>
      <p class="sub">This segment has already been completed on this device/browser.</p>
      <div class="footer-actions">
        ${TEACHER_OVERRIDE ? `<button class="warn" onclick="teacherUnlockNow()">Teacher Unlock This Browser</button>` : ``}
        <button onclick="location.href='../index.html'">Back to Hub</button>
      </div>
    </div>
  `;
}
function teacherUnlockNow(){
  localStorage.removeItem(ATTEMPT_KEY);
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}
function buildIntro(){
  document.getElementById("app").innerHTML = `
    <a class="back-link" href="../index.html">← Back to Hub</a>
    <div class="panel name-card">
      <div class="kicker">Legend Mastery Series • Government</div>
      <h1>${TEST_META.title}</h1>
      <p class="sub">30-question OST-style segment. Name is required to begin. One attempt only.</p>
      <input id="nameInput" class="input" type="text" maxlength="60" placeholder="Enter your name to begin" />
      <div class="help">
        Recognition-focused segment. Broad content coverage again, but different wording and angle from Day 1.
      </div>
      <div class="footer-actions">
        ${TEACHER_OVERRIDE ? `<span class="tag">Teacher Override Active</span>` : ``}
        <button id="startBtn">Start Test</button>
      </div>
    </div>
  `;
  document.getElementById("startBtn").onclick = () => {
    const name = document.getElementById("nameInput").value.trim();
    if(!name){
      alert("Enter your name to begin.");
      return;
    }
    state.studentName = name;
    state.startedAt = new Date().toISOString();
    state.attemptNumber = 1;
    state.questionOrderSeed = `${state.studentName}|${state.startedAt}|${TEST_META.title}`;
    buildQuestions();
    save();
    renderTest();
  };
}
function buildTopbar(){
  const started = new Date(state.startedAt);
  const runtime = formatRuntime((Date.now() - started.getTime()) / 1000);
  const answered = countAnswered();
  const progressPct = Math.round((answered / QUESTIONS.length) * 100);
  return `
    <a class="back-link" href="../index.html">← Back to Hub</a>
    <div class="topbar">
      <div class="topbar-left">
        <button class="danger" onclick="hardRestart()">Restart Test</button>
      </div>
      <div class="topbar-right">
        ${teacherBadge()}
        <span class="pill">Name: ${escapeHtml(state.studentName)}</span>
        <span class="pill">Attempt: ${state.attemptNumber}</span>
        <span class="pill">Started: ${escapeHtml(nowLocalString(started))}</span>
        <span class="pill">Runtime: <span id="runtimeDisplay">${runtime}</span></span>
      </div>
    </div>
    <div class="panel">
      <div class="stats">
        <div class="stat"><div class="stat-label">Test</div><div class="stat-value">${TEST_META.day} ${TEST_META.segment}</div></div>
        <div class="stat"><div class="stat-label">Focus</div><div class="stat-value">${TEST_META.focus}</div></div>
        <div class="stat"><div class="stat-label">Progress</div><div class="stat-value">${answered} / ${QUESTIONS.length}</div></div>
        <div class="stat"><div class="stat-label">Completion</div><div class="stat-value">${progressPct}%</div></div>
      </div>
      <div class="progress-wrap"><div class="progress-bar" style="width:${progressPct}%"></div></div>
    </div>
  `;
}
function renderQuestion(){
  const q = QUESTIONS[state.current];
  const currentAnswer = state.answers[state.current];
  const multi = q.type === "multi";
  document.getElementById("app").innerHTML = buildTopbar() + `
    <div class="panel question-card">
      <div class="q-type">Question ${state.current + 1} of ${QUESTIONS.length} • ${q.type.toUpperCase()} • ${q.cs}</div>
      <div class="q-stem">${escapeHtml(q.stem)}</div>
      ${multi ? `<p class="multi-note">Select all correct answers, then press Confirm Selection.</p>` : ``}
      <div class="choices">
        ${q.choices.map((choice, i) => {
          const selected = Array.isArray(currentAnswer) && currentAnswer.includes(i);
          return `
            <button class="choice ${selected ? "selected" : ""}" onclick="${multi ? `toggleMulti(${i})` : `selectSingle(${i})`}">
              <span class="choice-letter">${letter(i)}.</span> ${escapeHtml(choice)}
            </button>
          `;
        }).join("")}
      </div>
      <div class="footer-actions">
        <button class="secondary" ${state.current === 0 ? "disabled" : ""} onclick="prevQuestion()">Previous</button>
        <button class="secondary" onclick="skipQuestion()">Skip</button>
        ${multi ? `<button onclick="confirmMulti()">Confirm Selection</button>` : ``}
        <button class="warn" onclick="reviewScreen()">Review / Submit</button>
      </div>
    </div>
  `;
}
function renderTest(){
  if(state.current < 0) state.current = 0;
  if(state.current >= QUESTIONS.length) state.current = QUESTIONS.length - 1;
  renderQuestion();
}
function selectSingle(i){
  state.answers[state.current] = [i];
  save();
  if(state.current < QUESTIONS.length - 1){
    state.current++;
    save();
    renderQuestion();
  }else{
    reviewScreen();
  }
}
function toggleMulti(i){
  const current = Array.isArray(state.answers[state.current]) ? [...state.answers[state.current]] : [];
  const idx = current.indexOf(i);
  if(idx >= 0) current.splice(idx,1);
  else current.push(i);
  state.answers[state.current] = current;
  save();
  renderQuestion();
}
function confirmMulti(){
  const current = state.answers[state.current];
  if(!Array.isArray(current) || current.length === 0){
    alert("Select at least one answer before confirming.");
    return;
  }
  if(state.current < QUESTIONS.length - 1){
    state.current++;
    save();
    renderQuestion();
  }else{
    reviewScreen();
  }
}
function prevQuestion(){
  if(state.current > 0){
    state.current--;
    save();
    renderQuestion();
  }
}
function skipQuestion(){
  if(state.current < QUESTIONS.length - 1){
    state.current++;
    save();
    renderQuestion();
  }else{
    reviewScreen();
  }
}
function jumpToQuestion(idx){
  state.current = idx;
  save();
  renderQuestion();
}
function reviewScreen(){
  const answered = countAnswered();
  const unanswered = QUESTIONS.length - answered;
  document.getElementById("app").innerHTML = buildTopbar() + `
    <div class="panel">
      <h2>Review Before Submitting</h2>
      <p class="sub">Answered: ${answered} of ${QUESTIONS.length}. Unanswered: ${unanswered}.</p>
      <div class="review-box">
        ${QUESTIONS.map((q, idx) => {
          const ans = state.answers[idx];
          const answerText = !ans
            ? "No answer"
            : q.type === "multi"
              ? "Answered: " + normalizeMulti(ans).map(v => letter(v)).join(", ")
              : "Answered: " + letter(ans[0]);
          return `
            <div class="review-item">
              <div class="review-top">
                <strong>Q${String(idx + 1).padStart(2,"0")}</strong>
                <span class="tag">${q.cs}</span>
              </div>
              <div class="muted">${escapeHtml(q.stem)}</div>
              <div style="margin-top:8px;"><span class="tag">${answerText}</span></div>
              <div class="footer-actions">
                <button class="secondary" onclick="jumpToQuestion(${idx})">Go to Question</button>
              </div>
            </div>
          `;
        }).join("")}
      </div>
      <hr class="sep">
      <div class="footer-actions">
        <button class="secondary" onclick="renderQuestion()">Back to Test</button>
        <button onclick="submitTest()">Submit Segment</button>
      </div>
    </div>
  `;
}
async function submitTest(){
  if(state.submitted) return;

  const endedAt = new Date().toISOString();
  const score = QUESTIONS.reduce((sum, q, idx) => sum + (isCorrect(q, state.answers[idx]) ? 1 : 0), 0);
  const accuracy = Math.round((score / QUESTIONS.length) * 100);

  const payload = {
    mode: "submit_test",
    studentName: state.studentName,
    subject: TEST_META.subject,
    week: TEST_META.week,
    day: TEST_META.day,
    segment: TEST_META.segment,
    title: TEST_META.title,
    focus: TEST_META.focus,
    startedAt: state.startedAt,
    endedAt,
    runtimeSeconds: Math.round((new Date(endedAt) - new Date(state.startedAt)) / 1000),
    score,
    total: QUESTIONS.length,
    accuracy,
    attemptNumber: state.attemptNumber,
    teacherOverride: TEACHER_OVERRIDE ? TEACHER_SECRET : "",
    questions: QUESTIONS.map((q, idx) => ({
      id: q.id,
      cs: q.cs,
      type: q.type,
      stem: q.stem,
      correctAnswer: q.answer,
      studentAnswer: state.answers[idx],
      correct: isCorrect(q, state.answers[idx]) ? 1 : 0
    }))
  };

  try{
    const res = await fetch(SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(payload)
    });
    const text = await res.text();
    let parsed = {};
    try{ parsed = JSON.parse(text); }catch(err){}
    if(parsed && parsed.ok === false){
      alert(parsed.message || "This test appears to have already been submitted.");
      if(!TEACHER_OVERRIDE){
        localStorage.setItem(ATTEMPT_KEY, "USED");
      }
      buildLockedScreen();
      return;
    }
  }catch(err){
    alert("Submission did not reach the spreadsheet. Check the Apps Script URL and deployment settings, then try again.");
    return;
  }

  if(!TEACHER_OVERRIDE){
    localStorage.setItem(ATTEMPT_KEY, "USED");
  }
  state.submitted = true;
  state.score = score;
  save();

  document.getElementById("app").innerHTML = `
    <a class="back-link" href="../index.html">← Back to Hub</a>
    <div class="panel">
      <div class="kicker">Submission Complete</div>
      <h1>${TEST_META.title}</h1>
      <div class="stats">
        <div class="stat"><div class="stat-label">Name</div><div class="stat-value">${escapeHtml(state.studentName)}</div></div>
        <div class="stat"><div class="stat-label">Attempt</div><div class="stat-value">${state.attemptNumber}</div></div>
        <div class="stat"><div class="stat-label">Date</div><div class="stat-value">${escapeHtml(new Date(endedAt).toLocaleDateString())}</div></div>
        <div class="stat"><div class="stat-label">Start</div><div class="stat-value">${escapeHtml(nowLocalString(state.startedAt))}</div></div>
        <div class="stat"><div class="stat-label">End</div><div class="stat-value">${escapeHtml(nowLocalString(endedAt))}</div></div>
        <div class="stat"><div class="stat-label">Runtime</div><div class="stat-value">${formatRuntime(payload.runtimeSeconds)}</div></div>
        <div class="stat"><div class="stat-label">Score</div><div class="stat-value">${score} / ${QUESTIONS.length}</div></div>
        <div class="stat"><div class="stat-label">Accuracy</div><div class="stat-value">${accuracy}%</div></div>
        <div class="stat"><div class="stat-label">Result</div><div class="stat-value ${accuracy >= 80 ? "result-ready" : "result-review"}">${accuracy >= 80 ? "READY" : "REVIEW"}</div></div>
      </div>
      <div class="footer-actions">
        ${TEACHER_OVERRIDE ? `<button class="warn" onclick="teacherUnlockNow()">Teacher Unlock Again</button>` : ``}
        <button onclick="location.href='../index.html'">Back to Hub</button>
      </div>
    </div>
  `;
  localStorage.removeItem(STORAGE_KEY);
}
function tick(){
  const el = document.getElementById("runtimeDisplay");
  if(el && state.startedAt){
    el.textContent = formatRuntime((Date.now() - new Date(state.startedAt).getTime()) / 1000);
  }
}

load();
if(isLocked()){
  buildLockedScreen();
}else if(!state.studentName || !state.startedAt){
  buildIntro();
}else{
  buildQuestions();
  renderTest();
}

setInterval(tick, 1000);

window.hardRestart = hardRestart;
window.prevQuestion = prevQuestion;
window.skipQuestion = skipQuestion;
window.reviewScreen = reviewScreen;
window.jumpToQuestion = jumpToQuestion;
window.selectSingle = selectSingle;
window.toggleMulti = toggleMulti;
window.confirmMulti = confirmMulti;
window.submitTest = submitTest;
window.teacherUnlockNow = teacherUnlockNow;
</script>
</body>
</html>
